<!DOCTYPE html> <html> <head> <title>Find My Bus</title> <style> body { font-family: Arial, sans-serif; background: linear-gradient(to right, #1e3c72, #2a5298); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; } .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 8px 20px rgba(0,0,0,0.2); width: 350px; text-align: center; } input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; } button { background-color: #2a5298; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; } button:hover { background-color: #1e3c72; } h2 { margin-bottom: 20px; } </style> </head> <body> <div class="card"> <h2>Find My Bus</h2> <form action="/search" method="POST"> <input type="text" name="source" placeholder="Enter Current Location" required> <input type="text" name="destination" placeholder="Enter Destination Location" required> <button type="submit">Find Bus</button> </form> </div> </body> </html>
