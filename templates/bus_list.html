<!DOCTYPE html>
<html>
<head>

<title>Buses</title>

<style>

body{
font-family: Arial, sans-serif;
background:#2f4f8f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{

background:#eaeaea;
padding:35px;
border-radius:15px;
width:520px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

h2{

text-align:center;
margin-bottom:25px;

}

.bus-card{

background:#efefef;
border-radius:12px;
padding:18px;
margin-bottom:18px;
display:flex;
align-items:center;
cursor:pointer;
transition:0.25s;

}

.bus-card:hover{

transform:scale(1.02);
box-shadow:0 6px 15px rgba(0,0,0,0.2);

}

.bus-icon{

font-size:30px;
margin-right:15px;

}

.bus-info{

line-height:1.5;

}

.bus-name{

font-weight:bold;
font-size:16px;

}

.route{

color:#555;
font-size:14px;

}

.arrival{

color:green;
font-weight:bold;

}

.recommend{

background:#22c55e;
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
display:inline-block;
margin-top:4px;

}

.search-again{

text-align:center;
margin-top:20px;

}

a{

text-decoration:none;
color:black;

}

</style>

</head>


<body>

<div class="container">

<h2>🚌 Buses from {{source}} to {{destination}}</h2>


{% for bus in buses %}

<a href="/bus/{{bus.id}}">

<div class="bus-card">

<div class="bus-icon">🚌</div>

<div class="bus-info">

<div class="bus-name">{{bus.name}}</div>

<div class="route">{{bus.route}}</div>

<div class="arrival">{{bus.arrival}}</div>

<!-- ⭐ AI Recommendation (only addition) -->
{% if bus.id == best_bus %}

<div class="recommend">
⭐ AI Recommended Bus
</div>

{% endif %}

</div>

</div>

</a>

{% endfor %}


<div class="search-again">

<a href="/">← Search Again</a>

</div>

</div>

</body>
</html>
